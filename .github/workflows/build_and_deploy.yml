name: Deploy GraphQL API to Azure App Service (Linux)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write   # required to request the OIDC token for Azure login
  contents: read    # required to checkout the repo

env:
  AZURE_WEBAPP_NAME: test-graphql-deployment
  AZURE_RESOURCE_GROUP: rg-test-deployment
  AZURE_WEBAPP_SLOT: staging
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish --configuration Release --no-build --output ${{ github.workspace }}/publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: ${{ github.workspace }}/publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          path: ${{ github.workspace }}/publish

      - name: Azure login (OIDC via federated credential on Managed Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ github.workspace }}/publish

      - name: Azure logout
        if: always()
        run: az logout